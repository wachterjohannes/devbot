services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    # Identity Manager
    App\Identity\IdentityManager:
        arguments:
            $soulFile: '%devbot.identity.soul_file%'
            $identityFile: '%devbot.identity.identity_file%'
            $humansDir: '%devbot.identity.humans_dir%'

    # Ollama Web Bridge (for web search/fetch tools)
    App\Bridge\OllamaWebBridge:
        arguments:
            $apiKey: '%devbot.web.ollama_api_key%'
            $searchMaxResults: '%devbot.web.search_max_results%'
            $fetchTimeout: '%devbot.web.fetch_timeout%'

    # Memory stores
    App\Memory\Store\ShortTermStore:
        arguments:
            $maxEntries: 50

    App\Memory\Store\LongTermStore:
        arguments:
            $baseDir: '%kernel.project_dir%/memory/long-term'

    App\Memory\Store\EpisodicStore:
        arguments:
            $baseDir: '%kernel.project_dir%/memory/episodic'

    App\Memory\Store\SemanticStore:
        arguments:
            $store: '@ai.store.sqlite.memory_store'
            $vectorizer: '@ai.vectorizer.ollama_embeddings'

    # Amp HTTP client for non-blocking I/O with Revolt event loop
    devbot.http_client.amp:
        class: Symfony\Component\HttpClient\AmpHttpClient

    # Claude Code platform (no bundle config yet — registered manually)
    devbot.claude_code.platform:
        class: Symfony\AI\Platform\Platform
        factory: ['Symfony\AI\Platform\Bridge\ClaudeCode\PlatformFactory', 'create']
        arguments:
            $workingDirectory: '%devbot.shell.working_directory%'
            $timeout: 300

    # Coding delegate tool
    App\Tool\CodingAgent\CodingDelegateTool:
        arguments:
            $platform: '@devbot.claude_code.platform'
            $workingDirectory: '%devbot.shell.working_directory%'

    # Kanban Manager
    App\Kanban\KanbanManager:
        arguments:
            $boardFile: '%kernel.project_dir%/kanban/board.json'

    # Git tools
    App\Tool\Git\GitStatusTool:
        arguments:
            $workingDirectory: '%devbot.shell.working_directory%'

    App\Tool\Git\GitCommitTool:
        arguments:
            $workingDirectory: '%devbot.shell.working_directory%'

    App\Tool\Shell\ShellExecTool:
        arguments:
            $workingDirectory: '%devbot.shell.working_directory%'
            $timeout: 30

    # Skill Manager
    App\Skill\SkillManager:
        arguments:
            $skillsDir: '%kernel.project_dir%/skills'

    # Heartbeat
    App\Heartbeat\ScheduledTaskManager:
        arguments:
            $filePath: '%kernel.project_dir%/heartbeat/scheduled.json'

    App\Heartbeat\HeartbeatLoop:
        arguments:
            $tickInterval: 30

    # Memory lifecycle
    App\Memory\Lifecycle\GarbageCollector:
        arguments:
            $episodicRetentionDays: 90
            $decayRate: 0.01
            $minImportance: 0.2

    App\Memory\Lifecycle\SessionEndHandler:
        arguments:
            $importanceThreshold: 0.4

    # Context window management
    App\Agent\Prompt\ContextWindowManager:
        arguments:
            $maxTokens: 128000
            $reservedForResponse: 4000
            $reservedForTools: 8000

    # Memory injection processor
    App\Agent\Processor\MemoryInjectionProcessor:
        arguments:
            $maxInjectedEntries: 3
