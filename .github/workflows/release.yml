name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            suffix: linux-x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            suffix: linux-arm64

    runs-on: ${{ matrix.runner }}
    name: Build Linux ${{ matrix.suffix }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, pcntl, sockets
          tools: composer:v2

      - name: Prepare app
        run: ./build/prepare.sh

      - name: Build static binary
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile
          build-args: TARGETARCH=${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          outputs: type=local,dest=dist/out
          no-cache: true

      - name: Package binary with wrapper
        run: |
          mkdir -p dist/package
          mv dist/out/devbot dist/package/devbot-bin
          cp build/wrapper.sh dist/package/devbot
          chmod +x dist/package/devbot dist/package/devbot-bin
          cd dist/package && tar czf ../devbot-${{ matrix.suffix }}.tar.gz devbot devbot-bin
          ls -lh dist/devbot-${{ matrix.suffix }}.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devbot-${{ matrix.suffix }}
          path: dist/devbot-${{ matrix.suffix }}.tar.gz

  build-macos:
    runs-on: macos-14
    name: Build macOS ARM64
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, pcntl, sockets
          tools: composer:v2

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Prepare app
        run: ./build/prepare.sh

      - name: Clone FrankenPHP
        run: git clone --depth 1 https://github.com/dunglas/frankenphp.git /tmp/frankenphp

      - name: Build static binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd /tmp/frankenphp
          EMBED=${{ github.workspace }}/dist/app/ \
          PHP_EXTENSIONS="ctype,dom,fileinfo,filter,iconv,intl,mbstring,opcache,openssl,pcntl,pdo,pdo_sqlite,posix,readline,session,simplexml,sockets,sqlite3,tokenizer,xml,xmlwriter,zlib" \
          PHP_VERSION="8.4" \
          ./build-static.sh

      - name: Package binary with wrapper
        run: |
          mkdir -p dist/package
          cp /tmp/frankenphp/dist/frankenphp-mac-* dist/package/devbot-bin
          cp build/wrapper.sh dist/package/devbot
          chmod +x dist/package/devbot dist/package/devbot-bin
          cd dist/package && tar czf ../devbot-macos-arm64.tar.gz devbot devbot-bin
          ls -lh dist/devbot-macos-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devbot-macos-arm64
          path: dist/devbot-macos-arm64.tar.gz

  release:
    needs: [build-linux]
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: devbot-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum devbot-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/devbot-linux-x86_64.tar.gz
            dist/devbot-linux-arm64.tar.gz
            dist/devbot-macos-arm64.tar.gz
            dist/checksums.txt
          body: |
            ## Installation

            Download and extract for your platform:

            ```bash
            # Linux x86_64
            curl -Lo devbot.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/devbot-linux-x86_64.tar.gz
            tar xzf devbot.tar.gz

            # Linux ARM64
            curl -Lo devbot.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/devbot-linux-arm64.tar.gz
            tar xzf devbot.tar.gz
            ```

            This gives you two files: `devbot` (wrapper) and `devbot-bin` (runtime). Keep them in the same directory.

            ## Prerequisites

            - [Ollama](https://ollama.com) with `kimi-k2.5:cloud` and `nomic-embed-text` models
            - Ollama API key from https://ollama.com/settings/keys
            - [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code) (optional, for delegation)

            ## Quick Start

            ```bash
            ollama pull kimi-k2.5:cloud
            ollama pull nomic-embed-text

            ./devbot setup
            ./devbot run
            ```
